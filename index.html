<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geopolítica i Món | Itinerari d'Aprenentatge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0b1a2e;
  --navy-mid: #112240;
  --navy-card: #152a50;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --cream: #e8dcc8;
  --cream-dim: #9e9080;
  --white: #f5f0e8;
  --green: #2d6a4f;
  --red: #8b2635;
  --shadow: 0 6px 30px rgba(0,0,0,0.5);
  --border: 1px solid rgba(201,168,76,0.18);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--navy);
  color: var(--cream);
  font-family: 'Lora', Georgia, serif;
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 10% 20%, rgba(26,58,107,0.4) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 90% 80%, rgba(17,34,64,0.6) 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg width='80' height='80' viewBox='0 0 80 80' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.025'%3E%3Cpath d='M50 50v-8h-4v8h-8v4h8v8h4v-8h8v-4h-8zM10 10V2H6v8H-2v4h8v8h4v-8h8v-4h-8z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
}

#app { max-width: 860px; margin: 0 auto; padding: 20px; min-height: 100vh; }
h1, h2, h3, h4 { font-family: 'Playfair Display', serif; line-height: 1.2; }

/* ── SITE HEADER ── */
.site-header {
  text-align: center; padding: 48px 20px 36px;
  border-bottom: var(--border); margin-bottom: 40px; position: relative;
}
.site-header::before {
  content: ''; position: absolute; bottom: -1px; left: 50%; transform: translateX(-50%);
  width: 80px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.site-header .emblem { font-size: 52px; display: block; margin-bottom: 14px; filter: drop-shadow(0 4px 12px rgba(201,168,76,0.3)); }
.site-header h1 { font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 900; color: var(--gold); letter-spacing: -0.5px; }
.site-header .subtitol-header { color: var(--cream-dim); font-style: italic; margin-top: 8px; font-size: 0.95rem; }

.warning-banner {
  background: rgba(139,38,53,0.15); border: 1px solid rgba(139,38,53,0.5);
  border-radius: 8px; padding: 14px 20px; color: #e07080; font-size: 0.85rem;
  margin-bottom: 24px; line-height: 1.6;
}

/* ── LOGIN ── */
.login-wrap { max-width: 440px; margin: 0 auto; }
.login-card {
  background: var(--navy-mid); border: var(--border); border-radius: 14px;
  padding: 44px 40px; box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.login-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.login-card h2 { font-size: 1.8rem; color: var(--gold); margin-bottom: 6px; }
.login-card .intro { color: var(--cream-dim); font-size: 0.9rem; margin-bottom: 32px; line-height: 1.5; }
.form-group { margin-bottom: 22px; }
.form-group label {
  display: block; font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.2px;
  color: var(--gold-light); font-family: 'Playfair Display', serif; font-weight: 600; margin-bottom: 8px;
}
.form-group input {
  width: 100%; padding: 13px 16px; background: var(--navy);
  border: 1px solid rgba(201,168,76,0.25); border-radius: 7px;
  color: var(--white); font-family: 'Lora', serif; font-size: 1rem;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.form-group input:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.1); }
.error-box {
  background: rgba(139,38,53,0.2); border: 1px solid rgba(139,38,53,0.6);
  border-radius: 7px; padding: 13px 16px; color: #e08090; margin-top: 16px;
  font-size: 0.9rem; line-height: 1.5;
}

/* ── BUTTONS ── */
.btn-primary {
  width: 100%; padding: 15px; background: var(--gold); color: var(--navy); border: none;
  border-radius: 7px; font-family: 'Playfair Display', serif; font-size: 1.05rem;
  font-weight: 700; cursor: pointer; letter-spacing: 0.3px;
  transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 16px rgba(201,168,76,0.25);
}
.btn-primary:hover { background: var(--gold-light); box-shadow: 0 6px 20px rgba(201,168,76,0.35); }
.btn-primary:active { transform: scale(0.98); }
.btn-primary:disabled { opacity: 0.55; cursor: not-allowed; box-shadow: none; }
.btn-secondary {
  padding: 13px 28px; background: transparent; border: 1px solid var(--gold);
  color: var(--gold); border-radius: 7px; font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
}
.btn-secondary:hover { background: rgba(201,168,76,0.1); }
.btn-amber {
  padding: 13px 28px; background: rgba(201,168,76,0.12); border: 1px solid rgba(201,168,76,0.4);
  color: var(--gold-light); border-radius: 7px; font-family: 'Playfair Display', serif;
  font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%;
}
.btn-amber:hover { background: rgba(201,168,76,0.22); }

/* ── ALUMNE BAR ── */
.alumne-bar {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--navy-mid); border: var(--border); border-radius: 8px;
  padding: 12px 20px; margin-bottom: 28px;
}
.alumne-bar .nom { color: var(--gold); font-family: 'Playfair Display', serif; font-weight: 600; font-size: 0.95rem; }
.alumne-bar .progres-text { color: var(--cream-dim); font-size: 0.8rem; margin-left: 10px; }
.alumne-bar .btn-sortir {
  background: none; border: 1px solid rgba(201,168,76,0.2); color: var(--cream-dim);
  padding: 6px 14px; border-radius: 5px; cursor: pointer; font-size: 0.82rem;
  font-family: 'Lora', serif; transition: all 0.2s;
}
.alumne-bar .btn-sortir:hover { border-color: var(--gold); color: var(--gold); }

/* ── PROGRESS BAR ── */
.progress-global { background: rgba(201,168,76,0.08); border-radius: 20px; height: 5px; margin-bottom: 36px; overflow: hidden; }
.progress-bar { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold-light)); border-radius: 20px; transition: width 0.6s ease; }

/* ══════════════════════════════════════
   INSÍGNIES PANEL
══════════════════════════════════════ */
.section-label {
  font-family: 'Playfair Display', serif; font-size: 0.78rem; text-transform: uppercase;
  letter-spacing: 1.8px; color: var(--gold); margin-bottom: 16px;
  display: flex; align-items: center; gap: 10px;
}
.section-label::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.15); }

.insignies-section { margin-bottom: 40px; }
.insignies-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; }

.insignia-card {
  background: var(--navy-mid); border: 1px solid rgba(201,168,76,0.08);
  border-radius: 12px; padding: 16px 8px 14px; text-align: center;
  position: relative; transition: transform 0.25s, box-shadow 0.25s;
  overflow: hidden;
}
.insignia-card.earned {
  border-color: rgba(201,168,76,0.5);
  background: linear-gradient(160deg, #152a50 0%, #1c3568 100%);
  box-shadow: 0 0 24px rgba(201,168,76,0.15), inset 0 1px 0 rgba(201,168,76,0.2);
  cursor: default;
}
.insignia-card.earned::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
}
.insignia-card.repesca {
  border-color: rgba(201,168,76,0.3); cursor: pointer;
  animation: pulse-border 2s ease-in-out infinite;
}
.insignia-card.repesca:hover { transform: translateY(-3px); }
@keyframes pulse-border {
  0%,100% { border-color: rgba(201,168,76,0.3); box-shadow: none; }
  50% { border-color: rgba(201,168,76,0.6); box-shadow: 0 0 14px rgba(201,168,76,0.12); }
}
.insignia-card.failed { border-color: rgba(139,38,53,0.2); background: rgba(20,8,10,0.4); }
.insignia-card.locked { opacity: 0.25; }

.insignia-icon { font-size: 2.2rem; display: block; margin-bottom: 8px; line-height: 1; }
.insignia-card.locked .insignia-icon,
.insignia-card.failed .insignia-icon { filter: grayscale(1); }

.insignia-nom {
  font-family: 'Playfair Display', serif; font-size: 0.68rem; font-weight: 600;
  color: var(--cream); line-height: 1.3; margin-bottom: 8px; display: block;
}
.insignia-card.locked .insignia-nom { color: var(--cream-dim); }

.insignia-estat {
  font-size: 0.6rem; padding: 3px 7px; border-radius: 20px; display: inline-block;
  font-family: 'Playfair Display', serif; font-weight: 700;
  text-transform: uppercase; letter-spacing: 0.6px;
}
.insignia-card.earned .insignia-estat { background: rgba(45,106,79,0.25); color: #7ee8a2; }
.insignia-card.repesca .insignia-estat { background: rgba(201,168,76,0.15); color: var(--gold-light); }
.insignia-card.failed .insignia-estat { background: rgba(139,38,53,0.2); color: #e08090; }
.insignia-card.locked .insignia-estat { background: rgba(255,255,255,0.04); color: var(--cream-dim); }

.insignia-check {
  position: absolute; top: 7px; right: 7px; width: 16px; height: 16px;
  background: rgba(45,106,79,0.3); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.55rem; color: #7ee8a2;
}

/* ── MODULE CARDS ── */
.moduls-grid { display: grid; gap: 18px; }
.modul-card {
  background: var(--navy-mid); border: var(--border); border-radius: 12px;
  padding: 26px 28px; cursor: pointer; transition: all 0.3s ease;
  position: relative; overflow: hidden;
}
.modul-card::after {
  content: ''; position: absolute; left: 0; top: 0; bottom: 0;
  width: 4px; background: var(--gold); transition: width 0.3s;
}
.modul-card:hover:not(.locked)::after { width: 6px; }
.modul-card:hover:not(.locked) {
  transform: translateY(-3px); box-shadow: var(--shadow);
  border-color: rgba(201,168,76,0.4); background: var(--navy-card);
}
.modul-card.locked { opacity: 0.42; cursor: not-allowed; }
.modul-card.locked::after { background: var(--cream-dim); }
.modul-card.completat::after { background: var(--green); }
.modul-card-top { display: flex; align-items: flex-start; gap: 18px; }
.modul-num {
  font-family: 'Playfair Display', serif; font-size: 3rem; font-weight: 900;
  line-height: 1; color: var(--gold); opacity: 0.2; flex-shrink: 0; min-width: 50px;
}
.modul-card.completat .modul-num { color: var(--green); opacity: 0.3; }
.modul-info h3 { font-size: 1.15rem; color: var(--white); margin-bottom: 3px; }
.modul-info .sub { color: var(--cream-dim); font-size: 0.83rem; font-style: italic; }
.modul-status { margin-left: auto; font-size: 1.3rem; flex-shrink: 0; }
.modul-card-desc { color: var(--cream-dim); font-size: 0.88rem; line-height: 1.65; margin-top: 14px; padding-top: 14px; border-top: 1px solid rgba(201,168,76,0.08); }
.modul-badges { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.badge {
  font-size: 0.72rem; padding: 3px 10px; border-radius: 20px;
  background: rgba(201,168,76,0.08); border: 1px solid rgba(201,168,76,0.18);
  color: var(--gold-light); font-family: 'Playfair Display', serif;
}
.badge.verd { background: rgba(45,106,79,0.12); border-color: rgba(45,106,79,0.3); color: #6fcf97; }
.badge.vermell { background: rgba(139,38,53,0.12); border-color: rgba(139,38,53,0.3); color: #e08090; }
.badge.amber { background: rgba(201,168,76,0.1); border-color: rgba(201,168,76,0.35); color: var(--gold); }

/* ── MODULE DETAIL ── */
.back-btn {
  background: none; border: none; color: var(--gold); cursor: pointer;
  font-family: 'Lora', serif; font-size: 0.9rem; padding: 0; margin-bottom: 28px;
  display: inline-flex; align-items: center; gap: 8px; transition: gap 0.2s; opacity: 0.8;
}
.back-btn:hover { opacity: 1; gap: 12px; }
.modul-header { margin-bottom: 30px; }
.modul-header h2 { font-size: clamp(1.6rem, 4vw, 2.1rem); color: var(--gold); margin-bottom: 4px; }
.modul-header .sub-header { color: var(--cream-dim); font-style: italic; }

/* ── THEORY ── */
.teoria-box {
  background: var(--navy-mid); border: var(--border); border-radius: 12px;
  padding: 32px; margin-bottom: 36px; line-height: 1.8;
}
.teoria-box h3 {
  font-size: 1.1rem; color: var(--gold); text-transform: uppercase; letter-spacing: 1.5px;
  margin-bottom: 24px; padding-bottom: 14px; border-bottom: var(--border);
}
.teoria-box h4 { font-size: 1.05rem; color: var(--gold-light); margin: 24px 0 10px; }
.teoria-box p { margin-bottom: 14px; color: var(--cream); font-size: 0.95rem; }
.teoria-box ul, .teoria-box ol { margin: 10px 0 16px 22px; color: var(--cream); font-size: 0.93rem; line-height: 2; }
.teoria-box strong { color: var(--white); }
.teoria-box em { color: var(--gold-light); font-style: italic; }
.highlight-box {
  background: rgba(201,168,76,0.07); border-left: 3px solid var(--gold);
  padding: 14px 18px; border-radius: 0 8px 8px 0; margin: 18px 0;
  color: var(--cream); font-size: 0.92rem; font-style: italic; line-height: 1.7;
}
.recursos-box {
  background: rgba(11,26,46,0.7); border: 1px solid rgba(201,168,76,0.12);
  border-radius: 9px; padding: 20px 24px; margin-top: 24px;
}
.recursos-box h4 {
  font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--gold); margin-bottom: 14px; font-family: 'Playfair Display', serif;
}
.recursos-box a {
  display: flex; align-items: center; gap: 10px; color: var(--cream-dim);
  text-decoration: none; padding: 8px 0; border-bottom: 1px solid rgba(201,168,76,0.07);
  font-size: 0.88rem; transition: color 0.2s;
}
.recursos-box a:last-child { border-bottom: none; }
.recursos-box a:hover { color: var(--gold-light); }

/* ── EXERCISES ── */
.exercicis-titol { font-family: 'Playfair Display', serif; font-size: 1.35rem; color: var(--white); margin-bottom: 6px; }
.exercicis-sub { color: var(--cream-dim); font-size: 0.85rem; margin-bottom: 24px; line-height: 1.6; }
.exercici-section-label {
  font-size: 0.78rem; text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--gold); font-family: 'Playfair Display', serif;
  margin: 32px 0 16px; display: flex; align-items: center; gap: 10px;
}
.exercici-section-label::before, .exercici-section-label::after { content: ''; flex: 1; height: 1px; background: rgba(201,168,76,0.15); }

.comprensio-card { background: var(--navy-mid); border: var(--border); border-radius: 10px; padding: 24px; margin-bottom: 18px; }
.comprensio-card .q-num { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--cream-dim); margin-bottom: 10px; font-family: 'Playfair Display', serif; }
.comprensio-card .pregunta { font-size: 0.97rem; line-height: 1.65; color: var(--white); margin-bottom: 18px; }
.opcions-grid { display: grid; gap: 9px; }
.opcio-btn {
  display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px;
  background: var(--navy); border: 1px solid rgba(201,168,76,0.12); border-radius: 7px;
  cursor: pointer; text-align: left; width: 100%;
  color: var(--cream); font-family: 'Lora', serif; font-size: 0.9rem; line-height: 1.5;
  transition: all 0.18s;
}
.opcio-btn:hover:not(:disabled) { border-color: rgba(201,168,76,0.4); background: rgba(201,168,76,0.04); }
.opcio-btn:disabled { cursor: not-allowed; }
.opcio-lletra {
  display: inline-flex; align-items: center; justify-content: center;
  min-width: 24px; height: 24px; background: rgba(201,168,76,0.1); border-radius: 50%;
  font-size: 0.75rem; font-family: 'Playfair Display', serif; font-weight: 700;
  color: var(--gold); flex-shrink: 0; margin-top: 1px;
}
.opcio-btn.correcta { border-color: var(--green); background: rgba(45,106,79,0.12); }
.opcio-btn.correcta .opcio-lletra { background: rgba(45,106,79,0.3); color: #6fcf97; }
.opcio-btn.incorrecta { border-color: var(--red); background: rgba(139,38,53,0.12); }
.opcio-btn.incorrecta .opcio-lletra { background: rgba(139,38,53,0.3); color: #e08090; }
.feedback-msg { margin-top: 12px; padding: 10px 14px; border-radius: 6px; font-size: 0.85rem; display: none; }
.feedback-msg.show { display: block; }
.feedback-msg.ok { background: rgba(45,106,79,0.15); border: 1px solid rgba(45,106,79,0.4); color: #7ee8a2; }
.feedback-msg.err { background: rgba(139,38,53,0.15); border: 1px solid rgba(139,38,53,0.4); color: #e8909a; }

.reflexio-card { background: var(--navy-mid); border: 1px solid rgba(201,168,76,0.22); border-radius: 10px; padding: 24px; margin-bottom: 18px; }
.reflexio-badge {
  display: inline-block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px;
  color: var(--navy); background: var(--gold); padding: 3px 11px; border-radius: 20px;
  margin-bottom: 12px; font-family: 'Playfair Display', serif; font-weight: 700;
}
.reflexio-card .pregunta { font-size: 0.97rem; line-height: 1.7; color: var(--white); margin-bottom: 16px; }
.reflexio-card textarea {
  width: 100%; min-height: 130px; background: var(--navy);
  border: 1px solid rgba(201,168,76,0.18); border-radius: 7px; padding: 14px 16px;
  color: var(--cream); font-family: 'Lora', serif; font-size: 0.93rem; line-height: 1.65;
  resize: vertical; transition: border-color 0.2s, box-shadow 0.2s;
}
.reflexio-card textarea:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.08); }
.reflexio-card textarea::placeholder { color: rgba(158,144,128,0.35); }
.char-count { font-size: 0.75rem; color: var(--cream-dim); margin-top: 6px; text-align: right; }
.char-count.ok { color: #6fcf97; }

.submit-box { background: var(--navy-mid); border: var(--border); border-radius: 12px; padding: 30px; margin-top: 36px; text-align: center; }
.submit-box .punts-preview { font-family: 'Playfair Display', serif; font-size: 1.05rem; color: var(--gold); margin-bottom: 12px; }
.submit-box > p { color: var(--cream-dim); font-size: 0.88rem; margin-bottom: 22px; line-height: 1.6; }
.submit-error { background: rgba(139,38,53,0.15); border: 1px solid rgba(139,38,53,0.4); border-radius: 6px; color: #e08090; padding: 10px 14px; font-size: 0.88rem; margin-bottom: 16px; display: none; }
.submit-error.show { display: block; }

/* ══════════════════════════════════════
   SUCCESS & BADGE REVEAL
══════════════════════════════════════ */
.success-screen { text-align: center; padding: 40px 24px; animation: fadeInUp 0.5s ease; }
.success-screen .big-icon { font-size: 3.8rem; display: block; margin-bottom: 16px; }
.success-screen h2 { font-size: 1.9rem; color: var(--gold); margin-bottom: 10px; }

.score-summary { display: flex; justify-content: center; gap: 16px; margin: 16px 0 22px; flex-wrap: wrap; }
.score-pill {
  padding: 8px 20px; border-radius: 30px;
  font-family: 'Playfair Display', serif; font-size: 0.97rem; font-weight: 600;
}
.score-pill.ok { background: rgba(45,106,79,0.15); border: 1px solid rgba(45,106,79,0.4); color: #6fcf97; }
.score-pill.warn { background: rgba(201,168,76,0.1); border: 1px solid rgba(201,168,76,0.3); color: var(--gold-light); }
.score-pill.err { background: rgba(139,38,53,0.15); border: 1px solid rgba(139,38,53,0.4); color: #e08090; }

.errors-list { text-align: left; margin: 0 auto 24px; max-width: 580px; }
.errors-list-title {
  font-family: 'Playfair Display', serif; font-size: 0.78rem; text-transform: uppercase;
  letter-spacing: 1.5px; color: var(--cream-dim); margin-bottom: 12px;
}
.error-item { background: var(--navy-mid); border: 1px solid rgba(139,38,53,0.18); border-radius: 8px; padding: 14px 16px; margin-bottom: 10px; }
.error-item .ei-q { font-size: 0.88rem; color: var(--cream); margin-bottom: 6px; line-height: 1.5; }
.error-item .ei-err { font-size: 0.82rem; color: #e08090; margin-bottom: 4px; }
.error-item .ei-ok { font-size: 0.82rem; color: #6fcf97; }

.badge-reveal {

const KEY = 'geopol_v2';
let alumne = null;
let completats = {};
// completats[id] = { punts, total, reflexions[], insigniaEarnedDirecta, repesca: null|{punts,total,earned} }
let respostesActuals = {};
let currentView = 'login';
let currentModulId = null;
let simEstat = null;

function loadState() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) { const d = JSON.parse(raw); alumne = d.alumne||null; completats = d.completats||{}; }
  } catch(e) {}
}
function saveState() { localStorage.setItem(KEY, JSON.stringify({ alumne, completats })); }
function isModulDisponible(id) { return id === 1 || !!completats[id - 1]; }

// ── Lògica d'insígnies ──
function getInsigniaEstat(insId) {
  const ins = INSIGNIES.find(i => i.id === insId);
  if (!ins) return 'locked';
  if (ins.id === 'SIM') return completats['SIM'] ? 'earned' : 'locked';
  const mid = ins.modul;
  if (!completats[mid]) return 'locked';
  const data = completats[mid];
  if (mid === 4) return 'earned'; // M4 no té comprensió, sempre earned
  if (data.insigniaEarnedDirecta) return 'earned';
  if (data.repesca) return data.repesca.earned ? 'earned' : 'failed';
  return 'repesca'; // repesca disponible
}
function calcInsigniaDirecta(punts, total) {
  if (total === 0) return true;
  return (punts / total) >= MINIM_INSIGNIA;
}

function loginGAS(nom, codi) {
  return new Promise(resolve => {
    if (!GAS_CONFIGURAT) { resolve({ ok: true, nom }); return; }
    const cb = 'cb_' + Date.now();
    const t = setTimeout(() => { resolve({ ok:false, error:'timeout' }); delete window[cb]; }, 12000);
    window[cb] = data => { clearTimeout(t); delete window[cb]; resolve(data); };
    const s = document.createElement('script');
    s.src = GAS_URL + '?action=login&nom=' + encodeURIComponent(nom) + '&codi=' + encodeURIComponent(codi) + '&callback=' + cb;
    s.onerror = () => { clearTimeout(t); resolve({ ok:false, error:'network' }); };
    document.head.appendChild(s);
  });
}
function saveResultsGAS(payload) {
  if (!GAS_CONFIGURAT) { console.log('[DEMO] GAS results:', payload); return; }
  fetch(GAS_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({ action:'save', alumne, email:emailAlumne, ...payload }) }).catch(()=>{});
}
// Desa l'estat complet de l'alumne (completats) al full Progres → permet recuperar-lo en futures sessions
function saveProgressGAS() {
  if (!GAS_CONFIGURAT) { console.log('[DEMO] GAS progress:', completats); return; }
  fetch(GAS_URL, { method:'POST', mode:'no-cors', body: JSON.stringify({ action:'progress', alumne, email:emailAlumne, completats }) }).catch(()=>{});
}

function showLogin() {

  app.innerHTML = header() + warningBanner() + `
    <div class="login-wrap"><div class="login-card">
      <h2>Accés a l'itinerari</h2>
      <p class="intro">Introdueix les teves dades i el codi que t'ha facilitat el teu professor o professora per accedir a les activitats.</p>

        <input type="text" id="inp-nom" placeholder="Escriu el teu nom complet..." autocomplete="name" /></div>
      <div class="form-group"><label>Codi d'accés</label>
        <input type="text" id="inp-codi" placeholder="Codi facilitat pel professor/a" autocomplete="off" /></div>
      <button class="btn-primary" id="btn-login" onclick="handleLogin()">Entrar →</button>
      <div class="error-box" id="login-error" style="display:none;"></div>
    </div></div>`;
  document.getElementById('inp-nom').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('inp-codi').focus(); });
  document.getElementById('inp-codi').addEventListener('keydown', e => { if(e.key==='Enter') handleLogin(); });
}

let emailAlumne = '';
async function handleLogin() {
  const nom = document.getElementById('inp-nom').value.trim();
  const codi = document.getElementById('inp-codi').value.trim();
  const btn = document.getElementById('btn-login');
  const err = document.getElementById('login-error');
  if (!nom || !codi) { err.textContent='Cal omplir els dos camps.'; err.style.display='block'; return; }
  btn.disabled=true; btn.textContent='Verificant...'; err.style.display='none';
  const res = await loginGAS(nom, codi);
  if (res.ok) {
    alumne = nom;
    if (res.completats) completats = { ...res.completats, ...completats };
    saveState(); showModuls();
  } else {
    btn.disabled=false; btn.textContent='Entrar →';
    err.textContent = (res.error==='timeout'||res.error==='network')
      ? 'No s\'ha pogut connectar. Comprova la connexió o avisa el professor/a.'
      : 'Codi d\'accés incorrecte. Comprova les dades i torna-ho a intentar.';
    err.style.display='block';
  }
}

    return `<div class="sim-modul-card locked">
      <div class="sim-label">🔒 Missió Final</div>
      <h3 style="font-family:'Playfair Display',serif;color:var(--cream-dim);font-size:1.1rem;margin-bottom:6px;">🎭 Simulador Geopolític</h3>
      <p style="color:var(--cream-dim);font-size:0.84rem;line-height:1.65;">Es desbloqueja en completar el Mòdul 4.</p>
    </div>`;
  }
  if (done) {
    const rolData = SIM_ROLS[completats['SIM'].rol];
    const perfil = completats['SIM'].profile ? SIM_PERFILS[completats['SIM'].profile.tendency].etiqueta : '';
    return `<div class="sim-modul-card completat" onclick="showSimDone()">
      <div class="sim-label">✅ Missió Final Completada</div>
      <h3 style="font-family:'Playfair Display',serif;color:var(--gold);font-size:1.15rem;margin-bottom:8px;">🎭 Simulador Geopolític · ${rolData.bandera} ${rolData.pais}</h3>
      <p style="color:var(--cream-dim);font-size:0.84rem;margin-bottom:6px;">Perfil: <strong style="color:var(--cream)">${perfil}</strong></p>
      <p style="color:var(--cream-dim);font-size:0.82rem;">Toca per veure el resum de les teves decisions.</p>
    </div>`;
  }
  return `<div class="sim-modul-card" onclick="showSimulator()">
    <div class="sim-label">🎭 Missió Final — Desbloqueada</div>
    <h3 style="font-family:'Playfair Display',serif;color:var(--gold);font-size:1.2rem;margin-bottom:8px;">Simulador Geopolític: Diplomàcia en Crisi</h3>
    <p style="color:var(--cream);font-size:0.88rem;line-height:1.65;margin-bottom:14px;">Viu dues crisis reals des de dins: Ucraïna 2022 i l'Estret d'Ormuz 2026. Escull el teu rol — França, Xina o UE — i pren decisions sense respostes correctes.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;">
      <span class="badge">🇫🇷 França</span>
      <span class="badge">🇨🇳 Xina</span>
      <span class="badge">🇪🇺 Unió Europea</span>
      <span class="badge verd">2 fases · 6 rondes</span>
    </div>
  </div>`;
}

// ═══════════════════════════════════════════════════════
// ▸ LLISTA DE MÒDULS
// ═══════════════════════════════════════════════════════
function showModuls() {
  currentView = 'moduls';
  const done = Object.keys(completats).filter(k => !isNaN(k) && Number(k) >= 1 && Number(k) <= 4).length;
  const pct = Math.round((done / MODULS.length) * 100);

  const cards = MODULS.map(m => {
    const disp = isModulDisponible(m.id);
    const comp = !!completats[m.id];
    const data = completats[m.id];
    const ins = INSIGNIES.find(i => i.modul === m.id);
    const insEstat = ins ? getInsigniaEstat(ins.id) : null;

    let statusIcon = '🔒';
    if (comp) statusIcon = '✅';
    else if (disp) statusIcon = '▶';

    let badges = '';
    if (m.comprensio.length) badges += `<span class="badge">${m.comprensio.length} comprensió</span>`;
    if (m.reflexio.length) badges += `<span class="badge">${m.reflexio.length} reflexió</span>`;
    if (comp && data.total > 0) {
      const cls = data.insigniaEarnedDirecta ? 'verd' : 'vermell';
      badges += `<span class="badge ${cls}">${data.punts}/${data.total} pts</span>`;
    }
    if (comp && data.total === 0) badges += `<span class="badge verd">Completat</span>`;
    if (insEstat === 'repesca') badges += `<span class="badge amber">⚡ Repesca disponible</span>`;
    if (insEstat === 'failed') badges += `<span class="badge vermell">Insígnia no assolida</span>`;

    return `
      <div class="modul-card ${!disp?'locked':''} ${comp?'completat':''}"
           onclick="${disp?'showModul('+m.id+')':'void(0)'}">
        <div class="modul-card-top">
          <div class="modul-num">0${m.id}</div>
          <div class="modul-info"><h3>${m.icon} ${m.titol}</h3><span class="sub">${m.subtitol}</span></div>
          <div class="modul-status">${statusIcon}</div>
        </div>
        <p class="modul-card-desc">${m.desc}</p>
        <div class="modul-badges">${badges}</div>
      </div>`;
  }).join('');

  app.innerHTML = header() + warningBanner() + `
    <div class="alumne-bar">
      <div><span class="nom">👤 ${alumne}</span>
        <span class="progres-text">${done} de ${MODULS.length} mòduls completats</span></div>
      <button class="btn-sortir" onclick="sortir()">Sortir</button>
    </div>
    <div class="progress-global"><div class="progress-bar" style="width:${pct}%"></div></div>
    ${insigniesPanel()}
    <div class="section-label">Mòduls</div>
    <div class="moduls-grid">${cards}</div>
    ${buildSimCard()}`;
}

function sortir() {
  if (confirm('Vols sortir? El teu progrés es conservarà.')) { alumne=null; saveState(); showLogin(); }
}

// ═══════════════════════════════════════════════════════
// ▸ DETALL DE MÒDUL
// ═══════════════════════════════════════════════════════
function showModul(id) {
  currentView = 'modul'; currentModulId = id;
  const m = MODULS[id-1];
  if (!m || !isModulDisponible(id)) { showModuls(); return; }

  const recursos = m.recursos.map(r =>
    `<a href="${r.url}" target="_blank" rel="noopener"><span>${r.icon}</span>${r.text} ↗</a>`).join('');

  const teoriaHTML = `
    <div class="teoria-box">
      <h3>📚 Teoria</h3>${m.teoria}
      <div class="recursos-box"><h4>📌 Recursos per aprofundir</h4>${recursos}</div>
    </div>`;

  // ── MODE REVISIÓ (mòdul ja completat) ──────────────────
  if (completats[id]) {
    const data = completats[id];
    const lletres = ['A','B','C','D'];

    let exHTML = `<div class="revisio-banner">👁️ Mode revisió — les teves respostes estan guardades i no es poden modificar</div>`;
    exHTML += `<h2 class="exercicis-titol">Les teves respostes</h2>`;

    if (m.comprensio.length > 0) {
      exHTML += `<div class="exercici-section-label">Comprensió</div>`;
      exHTML += m.comprensio.map((q, qi) => {
        const chosen = data.respostes ? data.respostes[q.id] : undefined;
        const ops = q.opcions.map((op, oi) => {
          let cls = 'opcio-btn';
          if (oi === q.correcta) cls += ' correcta-review';
          else if (oi === chosen && chosen !== q.correcta) cls += ' incorrecta-review';
          const mark = oi === q.correcta ? '✓' : (oi === chosen && chosen !== q.correcta ? '✗' : lletres[oi]);
          return `<div class="${cls}"><span class="opcio-lletra">${mark}</span><span>${op}</span></div>`;
        }).join('');
        const result = chosen === undefined ? '' :
          chosen === q.correcta
            ? `<div class="feedback-msg correcta" style="display:block;margin-top:10px;">✓ Correcta</div>`
            : `<div class="feedback-msg incorrecta" style="display:block;margin-top:10px;">✗ Incorrecta — la correcta era: <strong>${q.opcions[q.correcta]}</strong></div>`;
        return `<div class="comprensio-card">
          <p class="q-num">Pregunta ${qi+1} de ${m.comprensio.length}</p>
          <p class="pregunta">${q.pregunta}</p>
          <div class="opcions-grid">${ops}</div>
          ${result}</div>`;
      }).join('');
    }

    const refLabel = m.comprensio.length > 0 ? 'Reflexió i anàlisi' : 'Anàlisi i pensament crític';
    exHTML += `<div class="exercici-section-label">${refLabel}</div>`;
    exHTML += m.reflexio.map((r, ri) => {
      const saved = data.reflexions ? data.reflexions.find(x => x.id === r.id) : null;
      const text = saved ? saved.text : '';
      return `<div class="reflexio-card">
        <span class="reflexio-badge">${m.comprensio.length===0?'Anàlisi '+(ri+1):'Reflexió '+(ri+1)}</span>
        <p class="pregunta">${r.pregunta}</p>
        <div class="reflexio-review-text">${text || '<em style="color:var(--cream-dim)">Sense resposta guardada</em>'}</div>
      </div>`;
    }).join('');

    app.innerHTML = header() + `
      <button class="back-btn" onclick="showModuls()">← Tornar als mòduls</button>
      <div class="modul-header"><h2>${m.icon} ${m.titol}</h2><p class="sub-header">${m.subtitol}</p></div>
      ${teoriaHTML}
      <div class="mode-revisio">${exHTML}</div>`;
    return;
  }

  // ── MODE INTERACTIU (mòdul no completat) ───────────────
  respostesActuals = {};
  let exHTML = `<h2 class="exercicis-titol">Exercicis</h2>`;
  if (m.comprensio.length > 0) {
    exHTML += `<p class="exercicis-sub">Llegeix la teoria i respon les preguntes. Veuràs el feedback immediatament per a cada pregunta. Després escriu les reflexions i entrega el mòdul.</p>`;
    exHTML += `<div class="exercici-section-label">Comprensió</div>`;
    exHTML += m.comprensio.map((q, qi) => {
      const lletres = ['A','B','C','D'];
      const ops = q.opcions.map((op,oi) =>
        `<button class="opcio-btn" id="op_${q.id}_${oi}" onclick="selectAnswer('${q.id}',${oi},${q.correcta})">
          <span class="opcio-lletra">${lletres[oi]}</span><span>${op}</span></button>`).join('');
      return `<div class="comprensio-card" id="q_${q.id}">
        <p class="q-num">Pregunta ${qi+1} de ${m.comprensio.length}</p>
        <p class="pregunta">${q.pregunta}</p>
        <div class="opcions-grid">${ops}</div>
        <div class="feedback-msg" id="fb_${q.id}"></div></div>`;
    }).join('');
  }

  const refLabel = m.comprensio.length > 0 ? 'Reflexió i anàlisi' : 'Anàlisi i pensament crític';
  exHTML += `<div class="exercici-section-label">${refLabel}</div>`;
  exHTML += m.reflexio.map((r,ri) => `
    <div class="reflexio-card">
      <span class="reflexio-badge">${m.comprensio.length===0?'Anàlisi '+(ri+1):'Reflexió '+(ri+1)}</span>
      <p class="pregunta">${r.pregunta}</p>
      <textarea id="ref_${r.id}" placeholder="Escriu aquí la teva resposta de manera reflexionada i argumentada..." oninput="updateCharCount('${r.id}')"></textarea>
      <p class="char-count" id="cc_${r.id}">0 caràcters (mínim 80)</p>
    </div>`).join('');

  const note = m.comprensio.length > 0
    ? 'Assegura\'t que has respost totes les preguntes i has escrit les reflexions (mínim 80 caràcters cadascuna).'
    : 'Assegura\'t que has escrit una resposta argumentada a cadascuna de les preguntes d\'anàlisi (mínim 80 caràcters).';

  exHTML += `<div class="submit-box">
    ${m.comprensio.length>0?'<p class="punts-preview" id="punts-preview">Puntuació comprensió: – / '+m.comprensio.length+'</p>':''}
    <p>${note}</p>
    <div class="submit-error" id="submit-error"></div>
    <button class="btn-primary" onclick="submitModul(${id})">Entregar mòdul →</button>
  </div>`;

  app.innerHTML = header() + `
    <button class="back-btn" onclick="showModuls()">← Tornar als mòduls</button>
    <div class="modul-header"><h2>${m.icon} ${m.titol}</h2><p class="sub-header">${m.subtitol}</p></div>
    ${teoriaHTML}
    ${exHTML}`;
}

function selectAnswer(qId, chosen, correct) {
  if (respostesActuals[qId] !== undefined) return;
  respostesActuals[qId] = chosen;
  const m = MODULS[currentModulId-1];
  const q = m.comprensio.find(q => q.id === qId);
  q.opcions.forEach((_,i) => { const b=document.getElementById('op_'+qId+'_'+i); if(b) b.disabled=true; });
  const cb=document.getElementById('op_'+qId+'_'+chosen);
  const kb=document.getElementById('op_'+qId+'_'+correct);
  if(kb) kb.classList.add('correcta');
  if(chosen!==correct && cb) cb.classList.add('incorrecta');
  const fb=document.getElementById('fb_'+qId);
  if(fb) {
    fb.classList.add('show');
    if(chosen===correct){fb.classList.add('ok');fb.textContent='✓ Correcte!';}
    else{fb.classList.add('err');fb.textContent='✗ Incorrecte. La resposta correcta era: '+q.opcions[correct];}
  }
  updatePuntsPreview();
}

function updatePuntsPreview() {
  const m = MODULS[currentModulId-1];
  const p = document.getElementById('punts-preview');
  if (!p || !m.comprensio.length) return;
  const correct = Object.entries(respostesActuals).filter(([id,ch]) => {
    const q=m.comprensio.find(q=>q.id===id); return q && ch===q.correcta;
  }).length;
  const answered = Object.keys(respostesActuals).length;
  p.textContent = `Puntuació comprensió: ${answered>0?correct:'–'} / ${m.comprensio.length}`;
}

function updateCharCount(refId) {
  const ta=document.getElementById('ref_'+refId);
  const cc=document.getElementById('cc_'+refId);
  if(!ta||!cc) return;
  const len=ta.value.trim().length;
  cc.textContent=len+' caràcters (mínim 80)';
  cc.className='char-count'+(len>=80?' ok':'');
}

function submitModul(id) {
  const m = MODULS[id-1];
  const errEl = document.getElementById('submit-error');

  if (m.comprensio.length > 0) {
    const unans = m.comprensio.filter(q => respostesActuals[q.id]===undefined);
    if (unans.length > 0) {
      errEl.textContent=`Falta respondre ${unans.length} pregunta/es de comprensió.`;
      errEl.classList.add('show'); errEl.scrollIntoView({behavior:'smooth',block:'center'}); return;
    }
  }
  const shortRef = m.reflexio.filter(r => {
    const ta=document.getElementById('ref_'+r.id); return !ta || ta.value.trim().length<80;
  });
  if (shortRef.length > 0) {
    errEl.textContent='Cal escriure almenys 80 caràcters a cadascuna de les respostes.';
    errEl.classList.add('show'); errEl.scrollIntoView({behavior:'smooth',block:'center'}); return;
  }
  errEl.classList.remove('show');

  const punts = m.comprensio.length > 0
    ? Object.entries(respostesActuals).filter(([qId,ch]) => {
        const q=m.comprensio.find(q=>q.id===qId); return q && ch===q.correcta;
      }).length : 0;
  const total = m.comprensio.length;
  const insigniaEarnedDirecta = calcInsigniaDirecta(punts, total);
  const reflexions = m.reflexio.map(r => ({ id:r.id, text:document.getElementById('ref_'+r.id).value.trim() }));

  completats[id] = { punts, total, reflexions, respostes: {...respostesActuals}, insigniaEarnedDirecta, repesca: null };
  saveState();
  saveResultsGAS({ modul_id:id, modul_titol:m.titol, punts, total, insignia:insigniaEarnedDirecta, reflexions:reflexions.map(r=>r.text) });
  saveProgressGAS(); // Desa l'estat complet al full Progres per recuperació futura
  showSuccess(id);
}

// ═══════════════════════════════════════════════════════
// ▸ SUCCESS + BADGE REVEAL
// ═══════════════════════════════════════════════════════
function showSuccess(id) {
  const m = MODULS[id-1];
  const data = completats[id];
  const seguent = MODULS[id];
  const ins = INSIGNIES.find(i => i.modul===id);
  const estat = ins ? getInsigniaEstat(ins.id) : null;
  const isFresh = Object.keys(respostesActuals).length > 0;

  // Score
  let scoreHTML = '';
  if (data.total > 0) {
    const pct = Math.round((data.punts/data.total)*100);
    const cls = pct>=60?'ok':pct>=40?'warn':'err';
    scoreHTML = `<div class="score-summary"><span class="score-pill ${cls}">${data.punts} / ${data.total} correctes (${pct}%)</span></div>`;
    // Error list (only fresh)
    if (isFresh && data.punts < data.total) {
      const errItems = m.comprensio
        .filter(q => respostesActuals[q.id]!==undefined && respostesActuals[q.id]!==q.correcta)
        .map(q => `<div class="error-item">
          <p class="ei-q">❓ ${q.pregunta}</p>
          <p class="ei-err">✗ La teva resposta: ${q.opcions[respostesActuals[q.id]]}</p>
          <p class="ei-ok">✓ Resposta correcta: ${q.opcions[q.correcta]}</p>
        </div>`).join('');
      if (errItems) scoreHTML += `<div class="errors-list"><p class="errors-list-title">Preguntes incorrectes</p>${errItems}</div>`;
    }
  } else {
    scoreHTML = `<div class="score-summary"><span class="score-pill ok">Mòdul d'anàlisi completat ✓</span></div>`;
  }

  // Badge reveal
  let badgeHTML = '';
  if (ins && estat) {
    if (estat==='earned') {
      badgeHTML = `<div class="badge-reveal earned-reveal">
        <span class="badge-reveal-icon">${ins.icon}</span>
        <h3>Insígnia obtinguda!</h3>
        <p><strong>${ins.nom}</strong><br><em>${ins.desc}</em></p>
      </div>`;
    } else if (estat==='repesca') {
      badgeHTML = `<div class="badge-reveal repesca-reveal">
        <span class="badge-reveal-icon">⚡</span>
        <h3>Repesca disponible</h3>
        <p>No has assolit el 60% mínim per obtenir la insígnia <strong>${ins.nom}</strong>. Tens una oportunitat de repesca amb 3 preguntes alternatives.</p>
        <button class="btn-amber" onclick="showRepesca(${id})">Intentar la repesca →</button>
      </div>`;
    }
  }

  const nextBtn = seguent
    ? `<button class="btn-primary" style="max-width:300px;margin:0 auto;" onclick="showModul(${seguent.id})">Continuar al mòdul ${seguent.id} →</button>`
    : `<button class="btn-primary" style="max-width:300px;margin:0 auto;" onclick="showModuls()">Veure el tauler →</button>`;

  app.innerHTML = header() + `
    <div class="success-screen">
      <span class="big-icon">🎉</span>
      <h2>Mòdul completat!</h2>
      <p style="color:var(--cream-dim);margin-bottom:14px;"><strong>${m.icon} ${m.titol}</strong></p>
      ${scoreHTML}${badgeHTML}
      <div style="display:flex;flex-direction:column;gap:12px;align-items:center;max-width:340px;margin:20px auto 0;">
        ${nextBtn}
        <button class="btn-secondary" onclick="showModuls()">Tornar a la llista de mòduls</button>
      </div>
    </div>`;
}

// ═══════════════════════════════════════════════════════
// ▸ REPESCA
// ═══════════════════════════════════════════════════════
function showRepesca(modulId) {
  const rep = REPESCA[modulId];
  const ins = INSIGNIES.find(i => i.modul===modulId);
  if (!rep || !ins) { showModuls(); return; }
  if (completats[modulId] && completats[modulId].repesca) { showSuccess(modulId); return; }

  respostesActuals = {};
  currentView = 'repesca'; currentModulId = modulId;
  const lletres = ['A','B','C','D'];

  const preguntes = rep.preguntes.map((q,qi) => {
    const ops = q.opcions.map((op,oi) =>
      `<button class="opcio-btn" id="op_${q.id}_${oi}" onclick="selectRepescaAnswer('${q.id}',${oi},${q.correcta})">
        <span class="opcio-lletra">${lletres[oi]}</span><span>${op}</span></button>`).join('');
    return `<div class="comprensio-card" id="q_${q.id}">
      <p class="q-num">Pregunta ${qi+1} de ${rep.preguntes.length}</p>
      <p class="pregunta">${q.pregunta}</p>
      <div class="opcions-grid">${ops}</div>
      <div class="feedback-msg" id="fb_${q.id}"></div></div>`;
  }).join('');

  app.innerHTML = header() + `
    <button class="back-btn" onclick="showModuls()">← Tornar als mòduls</button>
    <div class="repesca-header">
      <h2>⚡ Repesca — ${ins.icon} ${ins.nom}</h2>
      <p>Tens una única oportunitat de repesca. Respon les 3 preguntes alternatives. Necessites almenys 2 respostes correctes (67%) per desbloquejar la insígnia.</p>
      <span class="repesca-info">Mòdul ${modulId}: ${rep.titol}</span>
    </div>
    ${preguntes}
    <div class="submit-box">
      <p class="punts-preview" id="punts-preview-rep">Respostes: 0 / ${rep.preguntes.length}</p>
      <p>Respon totes les preguntes per entregar la repesca.</p>
      <div class="submit-error" id="submit-error-rep"></div>
      <button class="btn-primary" onclick="submitRepesca(${modulId})">Entregar repesca →</button>
    </div>`;
}

function selectRepescaAnswer(qId, chosen, correct) {
  if (respostesActuals[qId]!==undefined) return;
  respostesActuals[qId] = chosen;
  const rep = REPESCA[currentModulId];
  const q = rep.preguntes.find(q=>q.id===qId);
  q.opcions.forEach((_,i)=>{ const b=document.getElementById('op_'+qId+'_'+i); if(b) b.disabled=true; });
  const cb=document.getElementById('op_'+qId+'_'+chosen);
  const kb=document.getElementById('op_'+qId+'_'+correct);
  if(kb) kb.classList.add('correcta');
  if(chosen!==correct&&cb) cb.classList.add('incorrecta');
  const fb=document.getElementById('fb_'+qId);
  if(fb){
    fb.classList.add('show');
    if(chosen===correct){fb.classList.add('ok');fb.textContent='✓ Correcte!';}
    else{fb.classList.add('err');fb.textContent='✗ Incorrecte. La resposta correcta era: '+q.opcions[correct];}
  }
  // Update counter
  const answered=Object.keys(respostesActuals).length;
  const correctCount=Object.entries(respostesActuals).filter(([id2,ch2])=>{
    const q2=rep.preguntes.find(qq=>qq.id===id2); return q2&&ch2===q2.correcta;
  }).length;
  const pv=document.getElementById('punts-preview-rep');
  if(pv) pv.textContent=`Respostes: ${answered} / ${rep.preguntes.length} · Encerts: ${correctCount}`;
}

function submitRepesca(modulId) {
  const rep = REPESCA[modulId];
  const errEl = document.getElementById('submit-error-rep');
  const unans = rep.preguntes.filter(q=>respostesActuals[q.id]===undefined);
  if (unans.length>0){ errEl.textContent=`Falta respondre ${unans.length} pregunta/es.`; errEl.classList.add('show'); return; }
  errEl.classList.remove('show');

  const punts = rep.preguntes.filter(q=>respostesActuals[q.id]===q.correcta).length;
  const total = rep.preguntes.length;
  const earned = (punts/total) >= MINIM_REPESCA;

  completats[modulId].repesca = { punts, total, earned };
  saveState();
  saveResultsGAS({ modul_id:modulId, modul_titol:'Repesca M'+modulId, punts, total, insignia:earned, reflexions:[] });
  saveProgressGAS(); // Actualitza l'estat complet al full Progres
  showRepescaResult(modulId, punts, total, earned);
}

function showRepescaResult(modulId, punts, total, earned) {
  const ins = INSIGNIES.find(i=>i.modul===modulId);
  const seguent = MODULS[modulId];

  const badgeHTML = earned
    ? `<div class="badge-reveal earned-reveal">
        <span class="badge-reveal-icon">${ins.icon}</span>
        <h3>Insígnia obtinguda!</h3>
        <p>Enhorabona! Has superat la repesca i has obtingut la insígnia <strong>${ins.nom}</strong>.</p>
      </div>`
    : `<div class="badge-reveal failed-reveal">
        <span class="badge-reveal-icon" style="filter:grayscale(1)">${ins.icon}</span>
        <h3>Repesca no superada</h3>
        <p>Has obtingut ${punts}/${total}. La insígnia <strong>${ins.nom}</strong> no s'ha pogut desbloquejar, però el teu progrés continua.</p>
      </div>`;

  const nextBtn = seguent
    ? `<button class="btn-primary" style="max-width:300px;margin:0 auto;" onclick="showModul(${seguent.id})">Continuar al mòdul ${seguent.id} →</button>`
    : `<button class="btn-primary" style="max-width:300px;margin:0 auto;" onclick="showModuls()">Veure el tauler →</button>`;

  app.innerHTML = header() + `
    <div class="success-screen">
      <span class="big-icon">${earned?'⭐':'📋'}</span>
      <h2>${earned?'Repesca superada!':'Repesca completada'}</h2>
      <div class="score-summary">
        <span class="score-pill ${earned?'ok':'err'}">${punts} / ${total} correctes</span>
      </div>
      ${badgeHTML}
      <div style="display:flex;flex-direction:column;gap:12px;align-items:center;max-width:340px;margin:20px auto 0;">
        ${nextBtn}
        <button class="btn-secondary" onclick="showModuls()">Tornar a la llista de mòduls</button>
      </div>
    </div>`;
}

}

      <div class="rol-nom">${r.pais}</div>

    <div class="sim-rol-grid">${rolCards}</div>`;
}

function startSim(rolId) {
  simEstat = { rol:rolId, fase:1, ronda:0, decisions:{}, profile:null, reflexions:['',''], done:false };
  showSimRound();
}

function buildProgressDots() {
  const dots = [];
  for (let f = 1; f <= 2; f++) {
    if (f === 2) dots.push('<div class="sim-dot-sep"></div>');
    for (let r = 0; r < 3; r++) {
      const key = 'p'+f+'r'+r;
      let cls = 'sim-dot' + (f===2?' fase2':'');
      if (simEstat.decisions[key] !== undefined) cls += ' done';
      else if (f===simEstat.fase && r===simEstat.ronda) cls += ' current';
      dots.push('<div class="'+cls+'"></div>');
    }
  }
  return dots.join('');
}

function showSimRound() {
  const {fase,ronda,rol} = simEstat;
  const rd = SIM_DATA['p'+fase].rondes[rol][ronda];
  const rolData = SIM_ROLS[rol];
  const lletres = ['A','B','C'];

  const faseBadge = fase===1
    ? `<div class="sim-fase-badge">🇺🇦 Fase 1 · Ucraïna 2022 · Ronda ${ronda+1} de 3</div>`
    : `<div class="sim-fase-badge" style="border-color:rgba(91,155,213,0.3);color:#7ab4e0;">⚡ Fase 2 · Ormuz 2026 · Ronda ${ronda+1} de 3</div>`;

  const opcions = rd.opcions.map((op,i) => `
    <button class="sim-opcio-btn" onclick="chooseSimOption(${i})">
      <span class="sim-opcio-lletra">${lletres[i]}</span>
      <span>${op.text}</span>
    </button>`).join('');

  app.innerHTML = header() + `
    <button class="back-btn" onclick="showSimIntro()">← Canviar de rol</button>
    <div class="sim-progress-dots">${buildProgressDots()}</div>
    ${faseBadge}
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:18px;">
      <span style="font-size:1.5rem;">${rolData.bandera}</span>
      <span style="font-family:'Playfair Display',serif;font-size:0.82rem;color:var(--cream-dim);">${rolData.rol}</span>
    </div>
    <h2 style="font-size:1.45rem;color:var(--gold);margin-bottom:4px;">${rd.titol}</h2>
    <p style="color:var(--cream-dim);font-size:0.84rem;font-style:italic;margin-bottom:18px;">${rd.data}</p>
    <div class="sim-context-card">
      <p class="sim-data">Context de la situació</p>
      <p>${rd.context}</p>
    </div>
    <p style="font-family:'Playfair Display',serif;font-size:0.78rem;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;">La teva decisió</p>
    <div class="sim-opcions">${opcions}</div>`;
}

function chooseSimOption(idx) {
  const {fase,ronda} = simEstat;
  simEstat.decisions['p'+fase+'r'+ronda] = idx;
  showSimConsequence(idx);
}

function showSimConsequence(idx) {
  const {fase,ronda,rol} = simEstat;
  const rd = SIM_DATA['p'+fase].rondes[rol][ronda];
  const opcio = rd.opcions[idx];
  const lletres = ['A','B','C'];

  const isLastP1 = fase===1 && ronda===2;
  const isLastP2 = fase===2 && ronda===2;
  let nextBtn;
  if (isLastP1)     nextBtn = `<button class="btn-primary" style="max-width:320px;margin:0 auto" onclick="showPhase2Transition()">Avançar al 2026 →</button>`;
  else if (isLastP2) nextBtn = `<button class="btn-primary" style="max-width:320px;margin:0 auto" onclick="showSimReflection()">Reflexió final →</button>`;
  else              nextBtn = `<button class="btn-primary" style="max-width:320px;margin:0 auto" onclick="nextSimRound()">Continua →</button>`;

  const faseBadge = fase===1
    ? `<div class="sim-fase-badge">🇺🇦 Fase 1 · Ronda ${ronda+1} · Decisió ${lletres[idx]}</div>`
    : `<div class="sim-fase-badge" style="border-color:rgba(91,155,213,0.3);color:#7ab4e0;">⚡ Fase 2 · Ronda ${ronda+1} · Decisió ${lletres[idx]}</div>`;

  app.innerHTML = header() + `
    <div class="sim-progress-dots">${buildProgressDots()}</div>
    ${faseBadge}
    <h3 style="color:var(--gold);font-size:1.3rem;margin-bottom:4px;">${rd.titol}</h3>
    <p style="color:var(--cream-dim);font-size:0.82rem;font-style:italic;margin-bottom:18px;">${rd.data}</p>
    <div style="background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.18);border-radius:9px;padding:13px 16px;margin-bottom:18px;">
      <p style="font-size:0.78rem;color:var(--cream-dim);margin-bottom:4px;">Has escollit</p>
      <p style="font-size:0.91rem;color:var(--white);">${lletres[idx]}. ${opcio.text}</p>
    </div>
    <div class="sim-consequencia">
      <h4>📋 Conseqüències de la teva decisió</h4>
      <p>${opcio.consequencia}</p>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;margin-top:22px;">${nextBtn}</div>`;
}

function nextSimRound() {
  if (simEstat.ronda < 2) simEstat.ronda++;
  else { simEstat.fase = 2; simEstat.ronda = 0; }
  showSimRound();
}

function calcSimProfile() {
  let hD = 0;
  const rol = simEstat.rol;
  SIM_DATA.p1.rondes[rol].forEach((rd, i) => {
    const key = 'p1r'+i;
    if (simEstat.decisions[key] !== undefined)
      hD += rd.opcions[simEstat.decisions[key]].eixos.hD;
  });
  const tendency = hD >= 2 ? 'assertiu' : hD <= -2 ? 'dialoguista' : 'equilibrat';
  return { hD, tendency };
}

function showPhase2Transition() {
  simEstat.profile = calcSimProfile();
  const perfil = SIM_PERFILS[simEstat.profile.tendency];
  const intro = SIM_DATA.p2.intros[simEstat.rol][simEstat.profile.tendency];

  app.innerHTML = header() + `
    <div style="text-align:center;padding:20px 0 24px;animation:fadeInUp 0.5s ease;">
      <span style="font-size:3.2rem;display:block;margin-bottom:14px;">⏩</span>
      <h2 style="font-size:1.8rem;color:var(--gold);margin-bottom:8px;">Han passat 4 anys</h2>
      <p style="color:var(--cream-dim);font-size:0.88rem;">Les teves decisions de 2022 han tingut conseqüències.</p>
    </div>
    <div class="sim-perfil-card">
      <p class="sim-perfil-titol">El teu perfil diplomàtic (Fase 1)</p>
      <p class="sim-perfil-nom">${SIM_ROLS[simEstat.rol].bandera} ${SIM_ROLS[simEstat.rol].pais} · ${perfil.etiqueta}</p>
      <p class="sim-perfil-desc">${perfil.desc}</p>
    </div>
    <div class="fase2-alert">
      <p class="fa2-tag">⚡ Abril 2026 · Crisi de l'Estret d'Ormuz</p>
      <p>${SIM_DATA.p2.contextGlobal}</p>
    </div>
    <div class="sim-context-card" style="border-left-color:#5b9bd5;">
      <p class="sim-data" style="color:#5b9bd5;">La teva situació específica com a ${SIM_ROLS[simEstat.rol].pais}</p>
      <p>${intro}</p>
    </div>
    <div style="text-align:center;margin-top:24px;">
      <button class="btn-primary" style="max-width:320px;margin:0 auto" onclick="startPhase2()">Entrar a la Fase 2 →</button>
    </div>`;
}

function startPhase2() {
  simEstat.fase = 2; simEstat.ronda = 0;
  showSimRound();
}

function showSimReflection() {
  app.innerHTML = header() + `
    <div class="sim-fase-badge">🕊️ Reflexió metacognitiva final</div>
    <h2 style="font-size:1.65rem;color:var(--gold);margin-bottom:8px;">Reflexiona sobre les teves decisions</h2>
    <p style="color:var(--cream-dim);font-size:0.87rem;line-height:1.75;margin-bottom:26px;">Has pres 6 decisions crucials en dos moments crítics de la història recent. Ara mira enrere.</p>
    <div class="reflexio-card">
      <span class="reflexio-badge">Reflexió 1</span>
      <p class="pregunta">Mirant totes les teves decisions a les dues fases: quins valors o principis han guiat les teves eleccions? Han estat coherents entre la crisi d'Ucraïna i la d'Ormuz, o han canviat? Per qué?</p>
      <textarea id="sim-r1" placeholder="Escriu aquí la teva reflexió..." oninput="simCc(1)"></textarea>
      <p class="char-count" id="sim-cc1">0 caràcters (mínim 80)</p>
    </div>
    <div class="reflexio-card">
      <span class="reflexio-badge">Reflexió 2</span>
      <p class="pregunta">Compara les teves decisions amb el que ha passat a la realitat. Qué et diu la comparació sobre la complexitat de la presa de decisions en política internacional i sobre els límits dels actors internacionals — fins i tot els més poderosos?</p>
      <textarea id="sim-r2" placeholder="Escriu aquí la teva reflexió..." oninput="simCc(2)"></textarea>
      <p class="char-count" id="sim-cc2">0 caràcters (mínim 80)</p>
    </div>
    <div class="submit-box">
      <p>Cal un mínim de 80 caràcters a cada reflexió.</p>
      <div class="submit-error" id="sim-err"></div>
      <button class="btn-primary" onclick="submitSim()">Completar el simulador →</button>
    </div>`;
}

function simCc(n) {
  const ta = document.getElementById('sim-r'+n);
  const cc = document.getElementById('sim-cc'+n);
  if (!ta||!cc) return;
  const len = ta.value.trim().length;
  cc.textContent = len + ' caràcters (mínim 80)';
  cc.className = 'char-count' + (len>=80?' ok':'');
}

function submitSim() {
  const r1 = document.getElementById('sim-r1').value.trim();
  const r2 = document.getElementById('sim-r2').value.trim();
  const errEl = document.getElementById('sim-err');
  if (r1.length<80 || r2.length<80) {
    errEl.textContent = 'Cal escriure almenys 80 caràcters a cadascuna de les reflexions.';
    errEl.classList.add('show'); return;
  }
  errEl.classList.remove('show');
  simEstat.reflexions = [r1, r2];
  simEstat.done = true;

  completats['SIM'] = {
    rol: simEstat.rol,
    decisions: simEstat.decisions,
    profile: simEstat.profile,
    reflexions: [r1, r2],
    done: true
  };
  saveState();

  // Enviar al GAS
  const rol = simEstat.rol;
  const rolData = SIM_ROLS[rol];
  const lletres = ['A','B','C'];
  const decisionsArr = [];
  for (let f=1;f<=2;f++) for (let r=0;r<3;r++) {
    const key = 'p'+f+'r'+r;
    const idx = simEstat.decisions[key];
    if (idx!==undefined) {
      const rd = SIM_DATA['p'+f].rondes[rol][r];
      decisionsArr.push('F'+f+'R'+(r+1)+': '+lletres[idx]+') '+rd.opcions[idx].text.substring(0,70));
    }
  }
  const profileLabel = simEstat.profile ? SIM_PERFILS[simEstat.profile.tendency].etiqueta : '—';
  saveResultsGAS({
    modul_id:'SIM', modul_titol:'Simulador - '+rolData.pais,
    punts:0, total:0, insignia:true,
    reflexions:[
      'Rol: '+rolData.pais+' | Perfil: '+profileLabel,
      ...decisionsArr, r1, r2
    ]
  });
  saveProgressGAS();
  showSimDone();
}

function showSimDone() {
  const data = completats['SIM'];
  if (!data) { showModuls(); return; }
  const rolData = SIM_ROLS[data.rol];
  const perfil = data.profile ? SIM_PERFILS[data.profile.tendency] : null;
  const lletres = ['A','B','C'];

  const decisionsHTML = [1,2].map(f => {
    const items = [0,1,2].map(r => {
      const key='p'+f+'r'+r, idx=data.decisions[key];
      if (idx===undefined) return '';
      const rd = SIM_DATA['p'+f].rondes[data.rol][r];
      return `<p style="font-size:0.82rem;color:var(--cream-dim);margin-bottom:7px;line-height:1.55;">
        <span style="color:var(--gold);font-family:'Playfair Display',serif;font-size:0.78rem;">R${r+1}.</span> ${lletres[idx]}) ${rd.opcions[idx].text.substring(0,75)}…
      </p>`;
    }).join('');
    const label = f===1?'🇺🇦 Fase 1 · Ucraïna 2022':'⚡ Fase 2 · Ormuz 2026';
    return `<div style="margin-bottom:18px;"><p style="font-size:0.7rem;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;font-family:'Playfair Display',serif;margin-bottom:8px;">${label}</p>${items}</div>`;
  }).join('');

  app.innerHTML = header() + `
    <div class="success-screen">
      <span class="big-icon">🕊️</span>
      <h2>Simulador completat!</h2>
      <p style="color:var(--cream-dim);margin-bottom:6px;">Has viscut dues de les crisis geopolítiques més importants de la nostra era.</p>
      <div class="badge-reveal earned-reveal" style="max-width:320px;margin:20px auto;">
        <span class="badge-reveal-icon">🕊️</span>
        <h3>Insígnia obtinguda!</h3>
        <p><strong>Diplomàtica del Món</strong><br><em>Missió final completada</em></p>
      </div>
      ${perfil ? `<div class="sim-perfil-card" style="max-width:480px;margin:20px auto;">
        <p class="sim-perfil-titol">El teu perfil diplomàtic</p>
        <p class="sim-perfil-nom">${rolData.bandera} ${rolData.pais} · ${perfil.etiqueta}</p>
        <p class="sim-perfil-desc">${perfil.desc}</p>
      </div>` : ''}
      <div style="text-align:left;background:var(--navy-mid);border:var(--border);border-radius:12px;padding:20px 22px;margin:20px auto;max-width:520px;">
        <p style="font-family:'Playfair Display',serif;font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--gold);margin-bottom:16px;">Les teves decisions</p>
        ${decisionsHTML}
      </div>
      <div style="display:flex;flex-direction:column;align-items:center;max-width:340px;margin:20px auto 0;gap:12px;">
        <button class="btn-secondary" onclick="showModuls()">Tornar al tauler</button>
      </div>
    </div>`;
}

function showProfLogin() {

function handleProfLogin() {

function showProfPanel(msg) {
  app.innerHTML = `
    <header class="site-header">
      <span class="emblem">🗺️</span>
      <h1>Geopolítica i Món</h1>
      <p class="subtitol-header">Panell del professor/a</p>
    </header>
    <div style="max-width:680px;margin:0 auto;padding:0 0 40px;">
      ${msg ? `<div class="revisio-banner" style="margin-bottom:20px;">${msg}</div>` : ''}
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
        <h2 style="font-family:'Playfair Display',serif;color:var(--gold);font-size:1.4rem;">Alumnes</h2>
        <button class="btn-secondary" onclick="loadProfData()">↺ Actualitzar</button>
      </div>
      <div id="prof-taula">
        <p style="color:var(--cream-dim);text-align:center;padding:30px;">Carregant dades…</p>
      </div>
    </div>`;
  loadProfData();
}

function loadProfData() {
  if (!GAS_CONFIGURAT) {
    document.getElementById('prof-taula').innerHTML = `
      <div class="revisio-banner">Mode demostració — GAS no configurat. No hi ha dades reals.</div>`;
    return;
  }

  const url = GAS_URL + '?action=getStudents&password=' + encodeURIComponent(PROF_PASSWORD) + '&callback=__profcb__';

  window.__profcb__ = function(data) {
    delete window.__profcb__;
    renderProfTaula(data);
  };

  const s = document.createElement('script');
  s.src = url;
  s.onerror = () => {
    delete window.__profcb__;
    document.getElementById('prof-taula').innerHTML =
      `<p style="color:var(--cream-dim);text-align:center;">Error de xarxa.</p>`;
  };
  document.head.appendChild(s);
}

function renderProfTaula(data) {
  const el = document.getElementById('prof-taula');
  if (!el) return;

  if (!data.ok) {
    el.innerHTML = `<p style="color:#e88;text-align:center;">Error: ${data.error}</p>`;
    return;
  }

  if (!data.alumnes || data.alumnes.length === 0) {
    el.innerHTML = `<p style="color:var(--cream-dim);text-align:center;">Cap alumne al full Alumnes.</p>`;
    return;
  }

  const files = data.alumnes.map(a => {
    const progres = a.teProgres
      ? `${a.moduls}/4 mòduls${a.sim ? ' · 🕊️ Sim' : ''}`
      : '—';
    const updated = a.updated ? new Date(a.updated).toLocaleString('ca-ES', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : '—';
    const btnReset = a.teProgres
      ? `<button onclick="confirmarReset('${a.nom.replace(/'/g,"\\'")}', this)"
           style="font-size:0.78rem;padding:6px 12px;background:rgba(180,50,50,0.15);
           border:1px solid rgba(180,50,50,0.35);border-radius:6px;color:#e88;
           cursor:pointer;font-family:'Lora',serif;transition:all 0.2s;"
           onmouseover="this.style.background='rgba(180,50,50,0.28)'"
           onmouseout="this.style.background='rgba(180,50,50,0.15)'">
           Reiniciar progrés
         </button>`
      : `<span style="font-size:0.78rem;color:var(--cream-dim);">Sense progrés</span>`;

    return `<tr>
      <td style="padding:13px 14px;border-bottom:1px solid rgba(201,168,76,0.08);
          color:var(--white);font-size:0.9rem;">${a.nom}</td>
      <td style="padding:13px 14px;border-bottom:1px solid rgba(201,168,76,0.08);
          color:var(--cream-dim);font-size:0.85rem;">${progres}</td>
      <td style="padding:13px 14px;border-bottom:1px solid rgba(201,168,76,0.08);
          color:var(--cream-dim);font-size:0.82rem;">${updated}</td>
      <td style="padding:13px 14px;border-bottom:1px solid rgba(201,168,76,0.08);">${btnReset}</td>
    </tr>`;
  }).join('');

  el.innerHTML = `
    <table style="width:100%;border-collapse:collapse;background:var(--navy-mid);
        border:var(--border);border-radius:12px;overflow:hidden;">
      <thead>
        <tr style="background:var(--navy-card);">
          <th style="padding:11px 14px;text-align:left;font-family:'Playfair Display',serif;
              font-size:0.75rem;text-transform:uppercase;letter-spacing:1.2px;
              color:var(--gold);font-weight:600;">Alumne/a</th>
          <th style="padding:11px 14px;text-align:left;font-family:'Playfair Display',serif;
              font-size:0.75rem;text-transform:uppercase;letter-spacing:1.2px;
              color:var(--gold);font-weight:600;">Progrés</th>
          <th style="padding:11px 14px;text-align:left;font-family:'Playfair Display',serif;
              font-size:0.75rem;text-transform:uppercase;letter-spacing:1.2px;
              color:var(--gold);font-weight:600;">Última activitat</th>
          <th style="padding:11px 14px;text-align:left;font-family:'Playfair Display',serif;
              font-size:0.75rem;text-transform:uppercase;letter-spacing:1.2px;
              color:var(--gold);font-weight:600;">Acció</th>
        </tr>
      </thead>
      <tbody>${files}</tbody>
    </table>
    <p style="color:var(--cream-dim);font-size:0.78rem;margin-top:14px;text-align:center;">
      El reinici esborra el progrés del servidor. L'alumne/a haurà de tornar a entrar per aplicar-lo.
    </p>`;
}

function confirmarReset(nom, btn) {
  if (!confirm(`Segur que vols reiniciar el progrés de "${nom}"?\n\nL'alumne/a haurà de tornar a fer tots els mòduls des de zero.`)) return;
  btn.disabled = true;
  btn.textContent = 'Reiniciant…';

  fetch(GAS_URL, {
    method: 'POST',
    mode: 'no-cors',
    body: JSON.stringify({ action: 'resetStudent', password: PROF_PASSWORD, nom })
  }).then(() => {
    showProfPanel(`✓ Progrés de "${nom}" reiniciat correctament.`);
  }).catch(() => {
    showProfPanel(`✓ Ordre enviada per a "${nom}". Actualitza per confirmar.`);
  });
}

// ═══════════════════════════════════════════════════════
// ▸ INIT
// ═══════════════════════════════════════════════════════
loadState();
if (window.location.search.includes('reset')) {
  localStorage.removeItem('geopol_v2');
  window.location.href = window.location.pathname;
} else if (window.location.search.includes('prof')) {
  showProfLogin();
} else if (alumne) {
  showModuls();
} else {
  showLogin();
}
</script>
</body>
</html>
